version: "3.9"

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  initdb:
    image: flyway/flyway
    command: >
      -url=jdbc:postgresql://db:5432/${DB_NAME}
      -user=${DB_USERNAME}
      -password=${DB_PASSWORD}
      migrate
    volumes:
      - ./src/main/resources/db/migration:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

  app:
    image: nhtc2005/smart-home-system:latest
    container_name: smart-home-system
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      initdb:
        condition: service_completed_successfully

volumes:
  postgres_data:
